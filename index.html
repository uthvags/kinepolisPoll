<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinepolis Movie Poll</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text: #eee;
    --text-dim: #aaa;
    --success: #2ecc71;
    --border: #2a2a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: var(--accent);
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 20px;
  }

  .user-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding: 12px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 0.95rem;
    flex-wrap: wrap;
  }

  .user-bar label { color: var(--text-dim); }

  .user-bar input {
    padding: 6px 12px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--accent);
    font-size: 0.95rem;
    font-weight: 600;
    width: 200px;
    outline: none;
  }

  .user-bar input:focus { border-color: var(--accent); }

  .user-bar button {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  .user-bar button:hover { background: var(--accent-hover); }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
    font-size: 0.85rem;
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend .swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    display: inline-block;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 600px;
  }

  th, td {
    padding: 10px 12px;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: top;
  }

  thead th {
    background: var(--card);
    color: var(--accent);
    font-size: 0.95rem;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  .movie-cell {
    text-align: left;
    min-width: 220px;
    background: var(--surface);
  }

  .movie-title {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .movie-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .time-buttons {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }

  .time-btn {
    position: relative;
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text);
    min-width: 90px;
  }

  .time-btn:hover {
    border-color: var(--accent);
    transform: scale(1.05);
  }

  .time-btn.voted {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  .time-btn .vote-count {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 0.7rem;
    margin-left: 6px;
  }

  .time-btn .voters-tooltip {
    display: none;
    position: absolute;
    bottom: 105%;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    white-space: nowrap;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .time-btn:hover .voters-tooltip {
    display: block;
  }

  .empty-cell {
    color: var(--border);
    font-size: 0.8rem;
  }

  #loading {
    text-align: center;
    padding: 40px;
    font-size: 1.1rem;
    color: var(--text-dim);
  }

  #error-bar {
    display: none;
    background: var(--accent);
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    text-align: center;
  }

  .summary {
    margin-top: 20px;
    padding: 16px;
    background: var(--surface);
    border-radius: 8px;
  }

  .summary h3 {
    margin-bottom: 10px;
    color: var(--accent);
  }

  .summary-item {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
  }

  .summary-item:last-child {
    border-bottom: none;
  }

  .user-bar select {
    padding: 6px 10px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--accent);
    font-size: 0.9rem;
    font-weight: 600;
    outline: none;
  }

  .user-bar select:focus { border-color: var(--accent); }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  .admin-table th, .admin-table td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    text-align: left;
    font-size: 0.85rem;
  }

  .admin-table th {
    background: var(--card);
    color: var(--accent);
  }

  .admin-table tr:nth-child(even) {
    background: rgba(255,255,255,0.03);
  }

  @media (max-width: 768px) {
    body { padding: 10px; }
    th, td { padding: 6px 8px; }
    .time-btn { padding: 4px 10px; min-width: 70px; }
  }
</style>
</head>
<body>

<h1>Kinepolis Movie Night &mdash; 16 Mar to 18 Mar 2026</h1>
<p class="subtitle">Click a showtime to vote. Click again to remove your vote. Multiple votes allowed.</p>

<div id="error-bar"></div>

<div class="user-bar" id="name-bar" style="flex-direction:column;gap:10px;align-items:stretch;max-width:500px;margin:0 auto 20px">
  <div style="display:flex;gap:10px;align-items:center;justify-content:center">
    <label for="voter-name">Your name:</label>
    <input type="text" id="voter-name" placeholder="e.g. Uthvag" />
  </div>
  <div style="display:flex;gap:10px;align-items:center;justify-content:center">
    <label for="is-pvx">PVX member?</label>
    <select id="is-pvx">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
  </div>
  <div style="display:flex;gap:10px;align-items:center;justify-content:center">
    <label for="num-partners">Partners/kids:</label>
    <select id="num-partners">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
    <label for="num-others">Others:</label>
    <select id="num-others">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>
  <button onclick="saveName()" style="align-self:center">Start voting</button>
</div>

<div class="user-bar" id="user-bar" style="display:none">
  Voting as: <strong id="current-user"></strong> &mdash; <span id="current-info"></span>
  <button onclick="changeName()" style="background:var(--border);font-size:0.8rem;padding:4px 10px">Change</button>
  <button onclick="toggleAdmin()" style="background:var(--card);font-size:0.8rem;padding:4px 10px">Show all votes</button>
</div>

<div class="legend">
  <span><span class="swatch" style="background:var(--success)"></span> You voted</span>
  <span><span class="swatch" style="background:var(--surface);border:2px solid var(--border)"></span> Not voted</span>
</div>

<div id="loading">Loading votes...</div>
<div class="table-wrap" id="table-wrap" style="display:none"></div>

<div class="summary" id="summary" style="display:none">
  <h3>Top Picks (most votes)</h3>
  <div id="summary-list"></div>
</div>

<div class="summary" id="admin-panel" style="display:none">
  <h3>All Votes</h3>
  <div id="admin-table"></div>
</div>

<script>
// ─── Configuration ─────────────────────────────────────────────────────────
const SUPABASE_URL = "https://opadleobyehxumakwjvh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wYWRsZW9ieWVoeHVtYWt3anZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzE2MjAsImV4cCI6MjA4OTI0NzYyMH0.GsKMeIYORamBs56Q11cfuM0czWj7GmN7SEL2mCpkKA4";
const MATRIX_DATA = {"dates": ["Mon 16 Mar", "Tue 17 Mar", "Wed 18 Mar"], "movies": [{"title": "Avatar: Fire and Ash", "imdb": "?", "genre": "Actie, Sciencefiction", "cells": {"Mon 16 Mar": ["18:45"], "Tue 17 Mar": ["18:45"], "Wed 18 Mar": ["18:45"]}}, {"title": "Boomers", "imdb": "?", "genre": "Drama, Komedie", "cells": {"Mon 16 Mar": ["17:30"], "Tue 17 Mar": ["17:30"]}}, {"title": "Champagne", "imdb": "?", "genre": "Komedie", "cells": {"Wed 18 Mar": ["18:00"]}}, {"title": "Crime 101", "imdb": "?", "genre": "Thriller, Misdaad", "cells": {"Mon 16 Mar": ["20:30"], "Tue 17 Mar": ["17:40"]}}, {"title": "How to Make a Killing", "imdb": "?", "genre": "Drama, Misdaad", "cells": {"Mon 16 Mar": ["20:40"], "Tue 17 Mar": ["20:40"], "Wed 18 Mar": ["20:40"]}}, {"title": "Joe Speedboot", "imdb": "?", "genre": "Drama", "cells": {"Mon 16 Mar": ["17:50"], "Tue 17 Mar": ["17:50"], "Wed 18 Mar": ["17:50"]}}, {"title": "Jumpers", "imdb": "?", "genre": "Actie, Animatie", "cells": {"Mon 16 Mar": ["17:50", "20:10"], "Tue 17 Mar": ["17:50", "20:10"]}}, {"title": "Kiki's Delivery Service (re-release)", "imdb": "?", "genre": "Animatie, Fantasie", "cells": {"Mon 16 Mar": ["18:00"]}}, {"title": "Marty Supreme", "imdb": "?", "genre": "Drama", "cells": {"Mon 16 Mar": ["17:30"], "Tue 17 Mar": ["18:30"], "Wed 18 Mar": ["18:30"]}}, {"title": "Paaz", "imdb": "?", "genre": "Drama, Komedie", "cells": {"Mon 16 Mar": ["17:50"], "Tue 17 Mar": ["18:00"], "Wed 18 Mar": ["18:00"]}}, {"title": "Project Hail Mary", "imdb": "?", "genre": "Sciencefiction", "cells": {"Wed 18 Mar": ["18:30", "19:30"]}}, {"title": "Reminders of Him", "imdb": "?", "genre": "Liefde", "cells": {"Mon 16 Mar": ["17:40", "20:15"], "Tue 17 Mar": ["17:40", "20:15"], "Wed 18 Mar": ["17:50", "20:15"]}}, {"title": "Scream 7", "imdb": "?", "genre": "Horror, Thriller", "cells": {"Mon 16 Mar": ["20:45"], "Tue 17 Mar": ["17:45", "20:45"], "Wed 18 Mar": ["20:45"]}}, {"title": "Shelter", "imdb": "?", "genre": "Actie, Thriller", "cells": {"Mon 16 Mar": ["20:45"], "Tue 17 Mar": ["20:50"], "Wed 18 Mar": ["20:45"]}}, {"title": "The Bride", "imdb": "?", "genre": "Drama, Horror", "cells": {"Mon 16 Mar": ["17:45", "20:40"], "Tue 17 Mar": ["20:30"], "Wed 18 Mar": ["17:45"]}}, {"title": "The Housemaid", "imdb": "?", "genre": "Thriller", "cells": {"Mon 16 Mar": ["20:20"], "Tue 17 Mar": ["20:20"], "Wed 18 Mar": ["20:30"]}}, {"title": "Wuthering Heights", "imdb": "?", "genre": "Drama", "cells": {"Mon 16 Mar": ["17:40", "20:30"], "Tue 17 Mar": ["17:40", "20:25"], "Wed 18 Mar": ["17:40", "20:20"]}}]};
const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation',
};

let voterName = localStorage.getItem('kinepolis_voter') || '';
let isPVX = localStorage.getItem('kinepolis_pvx') || 'Yes';
let numPartners = parseInt(localStorage.getItem('kinepolis_partners') || '0', 10);
let numOthers = parseInt(localStorage.getItem('kinepolis_others') || '0', 10);
let allVotes = [];

function getTotalPeople(v) {
  return 1 + (v.Partners || 0) + (v.Others || 0);
}

// ─── Name handling ─────────────────────────────────────────────────────────

function saveName() {
  const input = document.getElementById('voter-name');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  voterName = name;
  isPVX = document.getElementById('is-pvx').value;
  numPartners = parseInt(document.getElementById('num-partners').value, 10);
  numOthers = parseInt(document.getElementById('num-others').value, 10);
  localStorage.setItem('kinepolis_voter', name);
  localStorage.setItem('kinepolis_pvx', isPVX);
  localStorage.setItem('kinepolis_partners', numPartners);
  localStorage.setItem('kinepolis_others', numOthers);
  document.getElementById('name-bar').style.display = 'none';
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('current-user').textContent = name;
  const total = 1 + numPartners + numOthers;
  document.getElementById('current-info').textContent =
    (isPVX === 'Yes' ? 'PVX' : 'non-PVX') + ', ' + total + ' total';
  renderTable();
}

function changeName() {
  document.getElementById('name-bar').style.display = 'flex';
  document.getElementById('user-bar').style.display = 'none';
  document.getElementById('voter-name').value = voterName;
  document.getElementById('is-pvx').value = isPVX;
  document.getElementById('num-partners').value = numPartners;
  document.getElementById('num-others').value = numOthers;
  document.getElementById('voter-name').focus();
}

function toggleAdmin() {
  const panel = document.getElementById('admin-panel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    renderAdmin();
  } else {
    panel.style.display = 'none';
  }
}

// ─── Supabase API helpers ──────────────────────────────────────────────────

async function fetchAllVotes() {
  const resp = await fetch(
    SUPABASE_URL + '/rest/v1/votes?select=id,MovieTitle,ShowDate,ShowTime,VoterName,IsPVX,Partners,Others&limit=5000',
    { headers: HEADERS }
  );
  if (!resp.ok) throw new Error('Failed to fetch votes: ' + resp.status);
  return await resp.json();
}

async function addVote(movie, date, time) {
  const resp = await fetch(
    SUPABASE_URL + '/rest/v1/votes',
    {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({
        MovieTitle: movie,
        ShowDate: date,
        ShowTime: time,
        VoterName: voterName,
        IsPVX: isPVX,
        Partners: numPartners,
        Others: numOthers,
      }),
    }
  );
  if (!resp.ok) throw new Error('Failed to add vote: ' + resp.status);
  const data = await resp.json();
  return data[0];
}

async function deleteVote(itemId) {
  const resp = await fetch(
    SUPABASE_URL + '/rest/v1/votes?id=eq.' + itemId,
    { method: 'DELETE', headers: HEADERS }
  );
  if (!resp.ok) throw new Error('Failed to delete vote: ' + resp.status);
}

// ─── Rendering ─────────────────────────────────────────────────────────────

function getVotersForSlot(movie, date, time) {
  return allVotes.filter(
    v => v.MovieTitle === movie && v.ShowDate === date && v.ShowTime === time
  );
}

function getMyVoteForSlot(movie, date, time) {
  return allVotes.find(
    v => v.MovieTitle === movie && v.ShowDate === date && v.ShowTime === time
      && v.VoterName === voterName
  );
}

function renderTable() {
  const dates = MATRIX_DATA.dates;
  const movies = MATRIX_DATA.movies;

  let html = '<table><thead><tr><th>Movie</th>';
  for (const d of dates) {
    html += '<th>' + d + '</th>';
  }
  html += '</tr></thead><tbody>';

  for (const movie of movies) {
    html += '<tr>';

    const rating = movie.imdb !== '?' ? ' &#11088; ' + movie.imdb + '/10' : '';
    const genre = movie.genre !== '?' ? movie.genre : '';
    html += '<td class="movie-cell">'
          + '<div class="movie-title">' + escHtml(movie.title) + '</div>'
          + '<div class="movie-meta">' + escHtml(genre) + rating + '</div>'
          + '</td>';

    for (const date of dates) {
      const times = movie.cells[date] || [];
      if (times.length === 0) {
        html += '<td><span class="empty-cell">&mdash;</span></td>';
        continue;
      }
      html += '<td><div class="time-buttons">';
      for (const t of times) {
        const voters = getVotersForSlot(movie.title, date, t);
        const myVote = getMyVoteForSlot(movie.title, date, t);
        const votedClass = myVote ? ' voted' : '';
        const totalPeople = voters.reduce((sum, v) => sum + getTotalPeople(v), 0);
        const countBadge = voters.length > 0
          ? '<span class="vote-count">' + totalPeople + '&#128100;</span>'
          : '';

        let tooltip = '';
        if (voters.length > 0) {
          const names = voters.map(v => {
            const extra = (v.Partners || 0) + (v.Others || 0);
            return v.VoterName + (v.IsPVX === 'Yes' ? '*' : '') + (extra > 0 ? ' (+' + extra + ')' : '');
          }).join(', ');
          tooltip = '<span class="voters-tooltip">' + escHtml(names) + ' (* = PVX)</span>';
        }

        html += '<button class="time-btn' + votedClass + '" '
              + 'data-movie="' + escAttr(movie.title) + '" '
              + 'data-date="' + escAttr(date) + '" '
              + 'data-time="' + escAttr(t) + '" '
              + 'onclick="toggleVote(this)">'
              + t + countBadge + tooltip
              + '</button>';
      }
      html += '</div></td>';
    }
    html += '</tr>';
  }

  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
  renderSummary();
}

function renderSummary() {
  const tally = {};
  const peopleTally = {};
  const pvxTally = {};
  for (const v of allVotes) {
    const key = v.MovieTitle + ' — ' + v.ShowDate + ' ' + v.ShowTime;
    tally[key] = (tally[key] || 0) + 1;
    peopleTally[key] = (peopleTally[key] || 0) + getTotalPeople(v);
    if (v.IsPVX === 'Yes') pvxTally[key] = (pvxTally[key] || 0) + 1;
  }

  const sorted = Object.entries(peopleTally).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) {
    document.getElementById('summary').style.display = 'none';
    return;
  }

  document.getElementById('summary').style.display = 'block';
  let html = '';
  for (const [label, people] of sorted.slice(0, 10)) {
    const votes = tally[label];
    const pvx = pvxTally[label] || 0;
    html += '<div class="summary-item"><span>' + escHtml(label) + '</span><span><strong>'
          + people + '</strong> people, ' + pvx + ' PVX (' + votes + ' vote' + (votes !== 1 ? 's' : '') + ')</span></div>';
  }
  document.getElementById('summary-list').innerHTML = html;
}

function renderAdmin() {
  let html = '<table class="admin-table"><thead><tr>'
    + '<th>Name</th><th>PVX?</th><th>Partners/kids</th><th>Others</th><th>Total</th><th>Movie</th><th>Date</th><th>Time</th>'
    + '</tr></thead><tbody>';

  const sorted = [...allVotes].sort((a, b) => a.VoterName.localeCompare(b.VoterName));
  for (const v of sorted) {
    html += '<tr>'
      + '<td>' + escHtml(v.VoterName) + '</td>'
      + '<td>' + (v.IsPVX || '?') + '</td>'
      + '<td>' + (v.Partners || 0) + '</td>'
      + '<td>' + (v.Others || 0) + '</td>'
      + '<td>' + getTotalPeople(v) + '</td>'
      + '<td>' + escHtml(v.MovieTitle) + '</td>'
      + '<td>' + escHtml(v.ShowDate) + '</td>'
      + '<td>' + escHtml(v.ShowTime) + '</td>'
      + '</tr>';
  }

  html += '</tbody></table>';
  document.getElementById('admin-table').innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')
          .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Vote toggle ───────────────────────────────────────────────────────────

async function toggleVote(btn) {
  if (!voterName) { changeName(); return; }

  const movie = btn.dataset.movie;
  const date = btn.dataset.date;
  const time = btn.dataset.time;

  btn.disabled = true;
  btn.style.opacity = '0.5';

  try {
    const existing = getMyVoteForSlot(movie, date, time);
    if (existing) {
      await deleteVote(existing.id);
      allVotes = allVotes.filter(v => v.id !== existing.id);
    } else {
      const newItem = await addVote(movie, date, time);
      allVotes.push({
        id: newItem.id,
        MovieTitle: movie,
        ShowDate: date,
        ShowTime: time,
        VoterName: voterName,
        IsPVX: isPVX,
        Partners: numPartners,
        Others: numOthers,
      });
    }
    renderTable();
  } catch (err) {
    showError('Vote failed: ' + err.message);
  }

  btn.disabled = false;
  btn.style.opacity = '1';
}

function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = msg;
  bar.style.display = 'block';
  setTimeout(() => { bar.style.display = 'none'; }, 5000);
}

// ─── Init ──────────────────────────────────────────────────────────────────

async function init() {
  // Restore saved name & party size
  if (voterName) {
    document.getElementById('name-bar').style.display = 'none';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('current-user').textContent = voterName;
    const total = 1 + numPartners + numOthers;
    document.getElementById('current-info').textContent =
      (isPVX === 'Yes' ? 'PVX' : 'non-PVX') + ', ' + total + ' total';
  }

  try {
    allVotes = await fetchAllVotes();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-wrap').style.display = 'block';
    renderTable();
  } catch (err) {
    document.getElementById('loading').textContent =
      'Failed to load votes. Check that Supabase is configured correctly.';
    showError(err.message);
    console.error(err);
  }
}

init();
</script>
